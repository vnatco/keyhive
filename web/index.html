<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="description" content="KeyHive - Secure Password Manager with Client-Side Encryption">
    <title>KeyHive</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff6b6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='11' width='18' height='11' rx='2' ry='2'%3E%3C/rect%3E%3Cpath d='M7 11V7a5 5 0 0 1 10 0v4'%3E%3C/path%3E%3C/svg%3E">

    <!-- Styles - Modular CSS -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">

    <script>var t=localStorage.getItem('keyhive_theme')||'system';document.documentElement.setAttribute('data-theme',t==='system'?'light':t);</script>
    <style>
        /* Minimal loading styles - Light theme to match base.css */
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --accent: #ff6b6b;
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #ff6b6b;
        }

        [data-theme="midnight"] {
            --bg-primary: #0f0f1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--text-secondary, #e5e7eb);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hide elements until JS loads */
        [data-view] {
            display: none;
        }

        [data-view].active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Loading KeyHive...</p>
        </div>

        <!-- Views will be rendered here by JS -->
    </div>

    <!-- Argon2 WASM (self-hosted) -->
    <script src="/js/lib/argon2.min.js"></script>

    <!-- QRCode.js for TOTP setup (self-hosted) -->
    <script src="/js/lib/qrcode.min.js"></script>

    <!-- Configuration -->
    <script src="/js/config.js"></script>

    <!-- Shared Utilities -->
    <script src="/js/utils/utils.js"></script>
    <script src="/js/utils/date-utils.js"></script>
    <script src="/js/utils/secret-store.js"></script>

    <!-- Platform Detection & Native App Integration -->
    <script src="/js/utils/platform.js"></script>

    <!-- Core modules -->
    <!-- Crypto operations isolated in Web Worker for security -->
    <script src="/js/crypto/crypto-api.js"></script>
    <script src="/js/crypto/re-encryption.js"></script>
    <script src="/js/utils/password-generator.js"></script>
    <script src="/js/utils/totp-generator.js"></script>
    <script src="/js/utils/session-timeout.js"></script>
    <script src="/js/utils/security-analyzer.js"></script>
    <script src="/js/utils/breach-checker.js"></script>
    <script src="/js/utils/clipboard.js"></script>
    <script src="/js/utils/favicon-fetcher.js"></script>
    <script src="/js/utils/connectivity.js"></script>
    <script src="/js/utils/biometric.js"></script>
    <script src="/js/utils/temp-id.js"></script>
    <script src="/js/utils/id-encoder.js"></script>
    <script src="/js/utils/random-names.js"></script>
    <script src="/js/storage/secure-token-store.js"></script>
    <script src="/js/api/client.js"></script>
    <script src="/js/storage/local-db.js"></script>
    <script src="/js/storage/vault.js"></script>

    <!-- Search Utilities -->
    <script src="/js/utils/search-utils.js"></script>

    <!-- UI Components -->
    <script src="/js/ui/popup.js"></script>
    <script src="/js/ui/custom-select.js"></script>
    <script src="/js/ui/folder-browser.js"></script>
    <script src="/js/ui/toast.js"></script>
    <script src="/js/ui/dropdown-manager.js"></script>
    <script src="/js/ui/sidebar.js"></script>
    <script src="/js/ui/footer.js"></script>
    <script src="/js/ui/home.js"></script>
    <script src="/js/ui/search-page.js"></script>
    <script src="/js/ui/add-edit-page.js"></script>
    <script src="/js/ui/view-page.js"></script>
    <script src="/js/ui/generator-page.js"></script>
    <script src="/js/ui/security-page.js"></script>
    <!-- Settings -->
    <script src="/js/ui/settings/base.js"></script>
    <script src="/js/ui/settings/trash.js"></script>
    <script src="/js/ui/settings/settings-local.js"></script>
    <script src="/js/ui/settings/settings-cloud.js"></script>
    <script src="/js/ui/settings/index.js"></script>
    <!-- Import -->
    <script src="/js/ui/settings/import/base-importer.js"></script>
    <script src="/js/ui/settings/import/import-renderer.js"></script>
    <script src="/js/ui/settings/import/flow-controller.js"></script>
    <script src="/js/ui/settings/import/importers/keyhive-v1.js"></script>
    <script src="/js/ui/settings/import/importers/nextcloud-passwords.js"></script>
    <script src="/js/ui/settings/import/index.js"></script>
    <script src="/js/ui/subscription-page.js"></script>
    <script src="/js/ui/auth-pages.js"></script>

    <!-- Main App -->
    <script src="/js/app.js"></script>

</body>
</html>
